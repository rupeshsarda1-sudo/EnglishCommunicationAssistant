name: Build English Assistant APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=8.2

      - name: Fix Permissions
        run: chmod +x gradlew

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate Mipmap Icons
        run: |
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          convert -size 48x48 xc:'#4CAF50' -fill white -gravity center \
            -pointsize 20 -annotate 0 'EA' \
            app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 72x72 xc:'#4CAF50' -fill white -gravity center \
            -pointsize 30 -annotate 0 'EA' \
            app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 96x96 xc:'#4CAF50' -fill white -gravity center \
            -pointsize 40 -annotate 0 'EA' \
            app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 144x144 xc:'#4CAF50' -fill white -gravity center \
            -pointsize 60 -annotate 0 'EA' \
            app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -size 192x192 xc:'#4CAF50' -fill white -gravity center \
            -pointsize 80 -annotate 0 'EA' \
            app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          echo "Mipmap icons generated successfully"

      - name: Run Unit Tests
        run: ./gradlew test --stacktrace

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnglishAssistant-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
